version: v2
plugins:
  - local: ./node_modules/.bin/protoc-gen-ts_proto
    out: src/providers/payerDaemon/gen
    opt:
      - outputServices=grpc-js
      - esModuleInterop=true
      - useOptionals=messages
      - importSuffix=.js
      - forceLong=bigint
      - env=node
inputs:
  - directory: ../livepeer-payment-library/proto
