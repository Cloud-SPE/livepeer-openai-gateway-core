# service-registry-daemon resolver-mode config — minimal-shell example.
# Copy to service-registry-config.yaml in this directory and edit.
#
# The daemon answers Select / ListKnown / ResolveByAddress RPCs based on
# this static node pool. Production deployments wire the daemon up to a
# registry contract or another discovery source instead; static is
# fine for a quickstart.

mode: static

nodes:
  - id: worker-chat-1
    url: https://worker1.example.com
    eth_address: '0x1111111111111111111111111111111111111111'
    capabilities:
      - openai:/v1/chat/completions
    weight: 100
    tier_allowed:
      - free
      - prepaid
    supported_models:
      - llama-3.3-70b
